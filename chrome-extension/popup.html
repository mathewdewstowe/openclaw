<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="logo">
      <div class="logo-icon"></div>
      <h1>OpenClaw</h1>
    </div>
    <form id="login-form">
      <input type="text" id="server-url" placeholder="http://localhost:3737" value="http://localhost:3737">
      <input type="text" id="username" placeholder="Username" autocomplete="username">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      <label class="remember"><input type="checkbox" id="remember" checked> Remember me</label>
      <button type="submit" class="btn-primary">Connect</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </div>

  <!-- Main Screen -->
  <div id="main-screen" class="screen hidden">
    <!-- Header -->
    <header>
      <div class="header-left">
        <div class="logo-small"></div>
        <span class="title">OpenClaw</span>
        <span id="status-dot" class="status-dot offline" title="Disconnected"></span>
      </div>
      <div class="header-right">
        <button id="open-dashboard" class="btn-icon" title="Open Dashboard">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11 7.5V11.5C11 12.05 10.55 12.5 10 12.5H2.5C1.95 12.5 1.5 12.05 1.5 11.5V4C1.5 3.45 1.95 3 2.5 3H6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M8.5 1.5H12.5V5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 8.5L12.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button id="refresh-btn" class="btn-icon" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 2.5V5.5H4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.2 8.5A5 5 0 1 0 3 4L1.5 5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="logout-btn" class="btn-icon" title="Logout">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 12.5H2.5C1.95 12.5 1.5 12.05 1.5 11.5V2.5C1.5 1.95 1.95 1.5 2.5 1.5H5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M9.5 10L12.5 7L9.5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12.5 7H5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="tasks">Tasks</button>
      <button class="tab" data-tab="goals">Goals</button>
      <button class="tab" data-tab="capture">Capture</button>
      <button class="tab" data-tab="status">Status</button>
    </nav>

    <!-- Tasks Tab -->
    <div id="tab-tasks" class="tab-content active">
      <div class="add-task">
        <input type="text" id="new-task-text" placeholder="Add a task...">
        <select id="new-task-priority">
          <option value="high">High</option>
          <option value="medium" selected>Med</option>
          <option value="low">Low</option>
        </select>
        <button id="add-task-btn" class="btn-small">+</button>
      </div>
      <div class="task-filters">
        <button class="filter active" data-filter="open">Open</button>
        <button class="filter" data-filter="done">Done</button>
        <button class="filter" data-filter="all">All</button>
      </div>
      <div id="tasks-list" class="scrollable"></div>
      <div id="tasks-empty" class="empty-state hidden">No tasks found</div>
    </div>

    <!-- Goals Tab -->
    <div id="tab-goals" class="tab-content hidden">
      <div id="goals-list" class="scrollable"></div>
      <div id="goals-empty" class="empty-state hidden">No goals found</div>
    </div>

    <!-- Capture Tab -->
    <div id="tab-capture" class="tab-content hidden">
      <div class="capture-section">
        <h3>Capture to Memory</h3>
        <p class="capture-hint">Save the current page or a note to OpenClaw memory.</p>
        <div class="capture-page">
          <button id="capture-page-btn" class="btn-primary">Capture Current Page</button>
        </div>
        <div class="capture-note">
          <textarea id="capture-note-text" placeholder="Type a note or paste content..." rows="4"></textarea>
          <input type="text" id="capture-note-key" placeholder="Memory key (e.g. research/competitor)">
          <button id="capture-note-btn" class="btn-primary">Save Note</button>
        </div>
        <div class="capture-task">
          <h3>Quick Task from Page</h3>
          <input type="text" id="capture-task-text" placeholder="Task description...">
          <button id="capture-task-btn" class="btn-primary">Create Task</button>
        </div>
      </div>
      <p id="capture-status" class="hidden"></p>
    </div>

    <!-- Status Tab -->
    <div id="tab-status" class="tab-content hidden">
      <div id="systems-list" class="scrollable"></div>
      <div id="latest-briefing" class="briefing-card hidden">
        <h3>Latest Briefing</h3>
        <div id="briefing-content"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
