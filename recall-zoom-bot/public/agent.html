<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Avatar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #0f0f1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .avatar-ring {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }

    .avatar-ring.idle {
      background: linear-gradient(135deg, #1e293b, #334155);
      box-shadow: 0 0 20px rgba(100, 116, 139, 0.3);
    }

    .avatar-ring.listening {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
      animation: pulse-listen 1.5s ease-in-out infinite;
    }

    .avatar-ring.speaking {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      box-shadow: 0 0 50px rgba(168, 85, 247, 0.6);
      animation: pulse-speak 0.6s ease-in-out infinite;
    }

    .avatar-ring.thinking {
      background: linear-gradient(135deg, #d97706, #f59e0b);
      box-shadow: 0 0 35px rgba(245, 158, 11, 0.5);
      animation: rotate-think 2s linear infinite;
    }

    .avatar-icon {
      font-size: 72px;
      line-height: 1;
    }

    @keyframes pulse-listen {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    @keyframes pulse-speak {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes rotate-think {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(30deg); }
    }

    .bot-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .bot-status {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    /* Audio visualizer bars */
    .visualizer {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 40px;
    }

    .visualizer .bar {
      width: 4px;
      background: #3b82f6;
      border-radius: 2px;
      transition: height 0.1s ease;
      min-height: 4px;
    }

    .caption {
      position: absolute;
      bottom: 40px;
      left: 60px;
      right: 60px;
      text-align: center;
      font-size: 18px;
      color: #e2e8f0;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
    }

    .caption.visible { display: block; }
  </style>
</head>
<body>
  <div class="avatar-ring idle" id="avatarRing">
    <span class="avatar-icon">🤖</span>
  </div>
  <div class="bot-name" id="botName">AI Assistant</div>
  <div class="bot-status" id="botStatus">Ready</div>
  <div class="visualizer" id="visualizer"></div>
  <div class="caption" id="caption"></div>

  <script>
    const avatarRing = document.getElementById("avatarRing");
    const botStatus = document.getElementById("botStatus");
    const caption = document.getElementById("caption");
    const visualizer = document.getElementById("visualizer");

    // Create visualizer bars
    for (let i = 0; i < 24; i++) {
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.style.height = "4px";
      visualizer.appendChild(bar);
    }
    const bars = visualizer.querySelectorAll(".bar");

    // ── State management ──

    function setState(state, text) {
      avatarRing.className = "avatar-ring " + state;
      if (text) botStatus.textContent = text;
      else {
        const labels = { idle: "Ready", listening: "Listening...", speaking: "Speaking...", thinking: "Processing..." };
        botStatus.textContent = labels[state] || state;
      }
    }

    function showCaption(text) {
      caption.textContent = text;
      caption.classList.add("visible");
    }

    function hideCaption() {
      caption.classList.remove("visible");
    }

    // ── Audio visualizer ──

    function updateVisualizer(levels) {
      bars.forEach((bar, i) => {
        const level = levels[i] || 0;
        bar.style.height = Math.max(4, level * 40) + "px";
      });
    }

    // Simulated idle animation
    function idleVisualize() {
      const levels = Array.from({ length: 24 }, () => Math.random() * 0.15);
      updateVisualizer(levels);
    }

    setInterval(idleVisualize, 150);

    // ── Exposed API for bot engine ──
    // The bot engine can call these via page.evaluate()

    window.botUI = {
      setState,
      showCaption,
      hideCaption,
      updateVisualizer,
    };

    setState("idle");
  </script>
</body>
</html>
